<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Team Lead - Shift Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#111111;
  --border:#d9d9de;
  --radius:16px;
  --shadow:0 6px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  padding:16px;
  color:var(--text);
}
.app{max-width:820px;margin:auto}
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:16px;
}
h1{text-align:center;margin-top:0}
h2{margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:10px}
label{
  font-weight:600;
  font-size:14px;
  display:block;
  margin-bottom:4px;
}
input[type="text"],
input[type="date"],
select,
textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
  background:#fff;
}
textarea{min-height:120px}
.check{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:8px 0;
  font-weight:500;
  font-size:15px;
  line-height:1.35;
}
.check input[type="checkbox"]{
  width:20px;
  height:20px;
  margin:0;
  flex:0 0 auto;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:black;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}
button.secondary{
  background:#eee;
  color:black;
}
.status{
  margin-top:10px;
  font-size:14px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <h1>AV TEAM LEAD - SHIFT REPORT</h1>
</div>

<div class="card">
  <h2>Shift Details</h2>
  <div class="grid">
    <div class="field">
      <label for="projectNumber">Project Number</label>
      <input id="projectNumber" type="text">
    </div>

    <div class="field">
      <label for="leadName">Lead Name</label>
      <input id="leadName" type="text">
    </div>

    <div class="field">
      <label for="date">Date</label>
      <input id="date" type="date">
    </div>

    <div class="field">
      <label for="targetTime">Did you meet the target time?</label>
      <select id="targetTime">
        <option value="">-</option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <h2>Pre-Shift Checklist</h2>
  <label class="check"><input id="pre1" type="checkbox"><span>Production Manager Call Completed</span></label>
  <label class="check"><input id="pre2" type="checkbox"><span>Additional Equipment & Labor Verified</span></label>
  <label class="check"><input id="pre3" type="checkbox"><span>Time Target Accepted</span></label>
</div>

<div class="card">
  <h2>Post-Shift Check</h2>
  <label class="check"><input id="post1" type="checkbox"><span>People Report (Part-Time & Contractors)</span></label>
  <label class="check"><input id="post2" type="checkbox"><span>Pull Sheet (Equipment Check)</span></label>
</div>

<div class="card">
  <h2>Client Satisfaction Score (1-10)</h2>
  <select id="score">
    <option value="">-</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option>
    <option>10</option>
  </select>
</div>

<div class="card">
  <h2>Notes</h2>
  <textarea id="notes"></textarea>
</div>

<div class="card">
  <button onclick="generatePDF()">GENERATE PDF</button>
  <button class="secondary" onclick="clearForm()">CLEAR FORM</button>
  <div class="status" id="status"></div>
</div>

</div>

<script>
function val(id){
  return document.getElementById(id).value || "-";
}

function chk(id){
  return document.getElementById(id).checked ? "Yes" : "-";
}

function clean(text){
  return String(text || "")
    .trim()
    .replace(/[^a-zA-Z0-9_-]+/g,"_")
    .replace(/^_+|_+$/g,"");
}

function fileName(){
  const project = clean(document.getElementById("projectNumber").value);
  const lead = clean(document.getElementById("leadName").value);

  if(project && lead) return project + "_" + lead + ".pdf";
  if(project) return project + ".pdf";
  if(lead) return lead + ".pdf";
  return "shift_report.pdf";
}

function generatePDF(){

  const status = document.getElementById("status");

  if (!window.jspdf || !window.jspdf.jsPDF) {
    status.textContent = "PDF library not loaded (need internet)";
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });

  let y = 50;

  function line(text,size=12,gap=20){
    doc.setFontSize(size);
    const wrapped = doc.splitTextToSize(String(text),500);
    doc.text(wrapped,50,y);
    y += (wrapped.length*(size+4))+gap-size;
  }

  doc.setFontSize(22);
  doc.text("AV TEAM LEAD - SHIFT REPORT",297.5,y,{align:"center"});
  y+=40;

  doc.setFontSize(14);
  doc.text("Shift Details",50,y);
  y+=20;

  line("Project Number: "+val("projectNumber"));
  line("Lead Name: "+val("leadName"));
  line("Date: "+val("date"));
  line("Target Time Met: "+val("targetTime"));

  doc.setFontSize(14);
  doc.text("Pre-Shift Checklist",50,y);
  y+=20;

  line("Production Manager Call Completed: "+chk("pre1"));
  line("Additional Equipment & Labor Verified: "+chk("pre2"));
  line("Time Target Accepted: "+chk("pre3"));

  doc.setFontSize(14);
  doc.text("Post-Shift Check",50,y);
  y+=20;

  line("People Report: "+chk("post1"));
  line("Pull Sheet: "+chk("post2"));

  doc.setFontSize(14);
  doc.text("Client Satisfaction",50,y);
  y+=20;

  line(val("score"));

  doc.setFontSize(14);
  doc.text("Notes",50,y);
  y+=20;

  line(val("notes"));

  const name = fileName();
  doc.save(name);

  status.textContent = "PDF saved: " + name;
}

function clearForm(){
  location.reload();
}
</script>

</body>
</html>
