<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Team Lead - Shift Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#111111;
  --border:#d9d9de;
  --radius:16px;
  --shadow:0 6px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  padding:16px;
  color:var(--text);
}
.app{max-width:820px;margin:auto}
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:16px;
}
h1{text-align:center;margin-top:0}
h2{margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:10px}
label{
  font-weight:600;
  font-size:14px;
  display:block;
  margin-bottom:4px;
}
input[type="text"],
input[type="date"],
select,
textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
  background:#fff;
}
textarea{min-height:120px}
.check{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:8px 0;
  font-weight:500;
  font-size:15px;
  line-height:1.35;
}
.check input[type="checkbox"]{
  width:20px;
  height:20px;
  margin:0;
  flex:0 0 auto;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:black;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}
button.secondary{
  background:#eee;
  color:black;
}
.note{
  margin-top:10px;
  font-size:13px;
  color:#666;
  line-height:1.4;
}
.status{
  margin-top:12px;
  font-size:14px;
  color:#333;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <h1>AV TEAM LEAD - SHIFT REPORT</h1>
</div>

<div class="card">
  <h2>Shift Details</h2>
  <div class="grid">
    <div class="field">
      <label for="projectNumber">Project Number</label>
      <input id="projectNumber" type="text">
    </div>

    <div class="field">
      <label for="leadName">Lead Name</label>
      <input id="leadName" type="text">
    </div>

    <div class="field">
      <label for="date">Date</label>
      <input id="date" type="date">
    </div>

    <div class="field">
      <label for="targetTime">Did you meet the target time?</label>
      <select id="targetTime">
        <option value="">-</option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <h2>Pre-Shift Checklist</h2>
  <label class="check"><input id="pre1" type="checkbox"><span>Production Manager Call Completed</span></label>
  <label class="check"><input id="pre2" type="checkbox"><span>Additional Equipment &amp; Labor Verified</span></label>
  <label class="check"><input id="pre3" type="checkbox"><span>Time Target Accepted</span></label>
</div>

<div class="card">
  <h2>Post-Shift Check</h2>
  <label class="check"><input id="post1" type="checkbox"><span>People Report (Part-Time &amp; Contractors)</span></label>
  <label class="check"><input id="post2" type="checkbox"><span>Pull Sheet (Equipment Check)</span></label>
</div>

<div class="card">
  <h2>Client Satisfaction Score (1-10)</h2>
  <select id="score">
    <option value="">-</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option>
    <option>10</option>
  </select>
</div>

<div class="card">
  <h2>Notes</h2>
  <textarea id="notes"></textarea>
</div>

<div class="card">
  <button onclick="generatePDF()">GENERATE PDF FILE</button>
  <button class="secondary" onclick="openReport()">OPEN PRINT VIEW</button>
  <button class="secondary" onclick="clearForm()">CLEAR FORM</button>
  <div class="note">GENERATE PDF FILE downloads a real PDF. OPEN PRINT VIEW keeps the old print version as backup.</div>
  <div class="status" id="status"></div>
</div>

</div>

<script>
function val(id){
  return document.getElementById(id).value || "-";
}

function chk(id){
  return document.getElementById(id).checked ? "Yes" : "-";
}

function fileNameFromProject(project){
  const clean = (project || "").trim().replace(/[^a-zA-Z0-9_-]+/g, "_").replace(/^_+|_+$/g, "");
  return (clean || "project_report") + ".pdf";
}

function generatePDF(){
  const status = document.getElementById("status");
  status.textContent = "";

  if (!window.jspdf || !window.jspdf.jsPDF) {
    status.textContent = "PDF library did not load. Please open the file while connected to the internet.";
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });

  const project = val("projectNumber");
  const fileName = fileNameFromProject(project);
  const notes = val("notes");
  let y = 50;

  function line(text, size=12, gap=20){
    doc.setFont("helvetica", "normal");
    doc.setFontSize(size);
    const wrapped = doc.splitTextToSize(String(text), 500);
    doc.text(wrapped, 50, y);
    y += (wrapped.length * (size + 4)) + gap - size;
  }

  doc.setFont("helvetica", "bold");
  doc.setFontSize(22);
  doc.text("AV TEAM LEAD - SHIFT REPORT", 297.5, y, { align: "center" });
  y += 35;

  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("Shift Details", 50, y);
  y += 22;

  line("Project Number: " + project);
  line("Lead Name: " + val("leadName"));
  line("Date: " + val("date"));
  line("Target Time Met: " + val("targetTime"));

  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("Pre-Shift Checklist", 50, y);
  y += 22;

  line("Production Manager Call Completed: " + chk("pre1"));
  line("Additional Equipment & Labor Verified: " + chk("pre2"));
  line("Time Target Accepted: " + chk("pre3"));

  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("Post-Shift Check", 50, y);
  y += 22;

  line("People Report (Part-Time & Contractors): " + chk("post1"));
  line("Pull Sheet (Equipment Check): " + chk("post2"));

  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("Client Satisfaction Score (1-10)", 50, y);
  y += 22;

  line(val("score"));

  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text("Notes", 50, y);
  y += 22;

  line(notes || "-", 12, 14);

  doc.save(fileName);
  status.textContent = "PDF file downloaded: " + fileName;
}

function openReport(){
  const project = val("projectNumber");
  const suggestedName = fileNameFromProject(project);
  const notes = (val("notes") || "-").replace(/\n/g, "<br>");

  const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${suggestedName}</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#fff;color:#111}
.toolbar{
  position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;
  padding:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap
}
.toolbar button{
  border:none;border-radius:10px;padding:12px 14px;font-size:15px;
  font-weight:700;background:#000;color:#fff
}
.sheet{max-width:820px;margin:0 auto;padding:28px 22px 40px}
h1{text-align:center;margin:0 0 20px}
.section{margin-top:20px;line-height:1.5}
@media print{
  .toolbar{display:none !important}
  .sheet{padding:0}
}
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">PRINT / SAVE PDF</button>
</div>

<div class="sheet">
  <h1>AV TEAM LEAD - SHIFT REPORT</h1>

  <div class="section">
    <b>Project Number:</b> ${project}<br>
    <b>Lead Name:</b> ${val("leadName")}<br>
    <b>Date:</b> ${val("date")}<br>
    <b>Target Time Met:</b> ${val("targetTime")}<br>
  </div>

  <div class="section">
    <h3>Pre-Shift Checklist</h3>
    Production Manager Call Completed: ${chk("pre1")}<br>
    Additional Equipment &amp; Labor Verified: ${chk("pre2")}<br>
    Time Target Accepted: ${chk("pre3")}<br>
  </div>

  <div class="section">
    <h3>Post-Shift Check</h3>
    People Report: ${chk("post1")}<br>
    Pull Sheet: ${chk("post2")}<br>
  </div>

  <div class="section">
    <h3>Client Satisfaction</h3>
    ${val("score")}
  </div>

  <div class="section">
    <h3>Notes</h3>
    ${notes}
  </div>
</div>
</body>
</html>`;

  const win = window.open("", "_blank");
  if (!win) {
    alert("Popup blocked. Please allow popups for this page.");
    return;
  }
  win.document.write(html);
  win.document.close();
}

function clearForm(){
  location.reload();
}
</script>

</body>
</html>
